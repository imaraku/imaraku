name: 日次キャンペーンツイート

on:
  schedule:
    # 【2026-05-23】 X が imaraku URL を flag → 連続 403 が reputation を悪化させていた経緯から、
    # 投稿スロットを 18時1本に圧縮（前は 12時 + 18時）。
    # 18時スロット (JST 16-19時) = UTC 7-10時 のみ fire。dispatch 取りこぼし対策で4本残す。
    # X reputation が完全回復したら 12時スロットも復活させる予定。
    - cron: '5 7,8,9,10 * * *'
  # 手動テスト用
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24 を使用（将来の廃止に対応）

permissions:
  contents: write   # posted_slots.json をコミット・プッシュするため

# 同workflowが重なったらキューイング（既存runを生かして次をqueue）
concurrency:
  group: daily-tweet
  cancel-in-progress: false

jobs:
  post-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 5   # 万一ハングしても5分で打ち切り（次のcronを邪魔しない）

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install requests requests-oauthlib

      - name: 日次ツイートを投稿
        env:
          TWITTER_API_KEY:             ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:          ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:        ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: python post_daily_tweet.py

      - name: スロット投稿履歴をコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in posted_slots.json kickoff_fired.json; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --cached --quiet; then
            echo "履歴に変更なし。スキップ"
            exit 0
          fi
          git commit -m "chore: 投稿スロット履歴を更新 [skip ci]"
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then
              echo "push 成功（試行 $i）"
              exit 0
            fi
            echo "push リトライ $i..."
            sleep $((i * 5))
          done
          echo "push 3回失敗" && exit 1
