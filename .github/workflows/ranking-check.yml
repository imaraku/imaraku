name: 楽天ランキングチェック＆ツイート

on:
  schedule:
    # JST 9, 12, 15, 18, 20, 22, 0, 3時 (= UTC 0, 3, 6, 9, 11, 13, 15, 18)
    # プライムタイム（18-22時）を2時間刻みに密化。深夜3/6時は削減。合計8回/day。
    - cron: '0 0,3,6,9,11,13,15,18 * * *'
  workflow_dispatch:         # 手動テスト用

permissions:
  contents: write   # ranking_cache.json をコミット・プッシュするために必要

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24 を使用（将来の廃止に対応）

jobs:
  check-ranking:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install requests requests-oauthlib beautifulsoup4

      - name: ランキングチェック＆ツイート
        env:
          TWITTER_API_KEY:             ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:          ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:        ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          RAKUTEN_APP_ID:              ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY:          ${{ secrets.RAKUTEN_ACCESS_KEY }}
        run: python check_ranking.py

      - name: キャッシュをコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # ranking_cache.json が存在する場合のみ add（初回は生成されない場合もある）
          if [ -f ranking_cache.json ]; then
            git add ranking_cache.json
            git diff --cached --quiet || git commit -m "chore: ranking cache update"
            git push
          else
            echo "ranking_cache.json が見つかりません。スキップします。"
          fi
