name: 楽天ランキングチェック＆ツイート

on:
  schedule:
    - cron: '0 */3 * * *'   # 3時間ごとに実行
  workflow_dispatch:         # 手動テスト用

jobs:
  check-ranking:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install requests requests-oauthlib beautifulsoup4

      - name: ランキングチェック＆ツイート
        env:
          TWITTER_API_KEY:             ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:          ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:        ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: python check_ranking.py

      - name: キャッシュをコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ranking_cache.json
          git diff --cached --quiet || git commit -m "chore: ranking cache update"
          git push
