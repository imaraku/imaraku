name: 楽天ランキングチェック＆ツイート

on:
  schedule:
    # 【2026-04-30 削減】X API クレジット節約のため8時刻→4時刻に絞り込み。
    # 【2026-05-06】:30 cron を削除（concurrency キュー取り合いで cancelled
    # メール多発のため）。各時刻 :00 のみで運用。
    # 【2026-05-23】 daily-tweet を 18時1スロットに減らした補填として
    # ranking-check は5月だけ 1.5倍 (4 → 6 fire/日) に増やす。
    # 6月以降の余分fire は check_ranking.py 側の月ゲートで skip される設計。
    # 全期間 fire: UTC 0,3,6,9,11,13 = JST 9, 12, 15, 18, 20, 22時 (6 fire/日)
    # 6月以降 active: JST 12, 18, 20, 22時 (4 fire/日、9時/15時を skip)
    - cron: '0 0,3,6,9,11,13 * * *'
  workflow_dispatch:         # 手動テスト用

permissions:
  contents: write   # ranking_cache.json をコミット・プッシュするために必要

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24 を使用（将来の廃止に対応）

concurrency:
  group: ranking-check
  cancel-in-progress: false

jobs:
  check-ranking:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install requests requests-oauthlib beautifulsoup4

      - name: ランキングチェック＆ツイート
        env:
          TWITTER_API_KEY:             ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:          ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:        ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          RAKUTEN_APP_ID:              ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY:          ${{ secrets.RAKUTEN_ACCESS_KEY }}
        run: python check_ranking.py

      - name: キャッシュをコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # ranking_cache.json が存在する場合のみ add（初回は生成されない場合もある）
          if [ -f ranking_cache.json ]; then
            git add ranking_cache.json
            if git diff --cached --quiet; then
              echo "変更なし。push スキップ"
              exit 0
            fi
            git commit -m "chore: ranking cache update"
            # check-campaigns 等との同時刻競合対策：rebase+retry 付き push
            for i in 1 2 3; do
              if git pull --rebase origin main && git push; then
                echo "push 成功（試行 $i）"
                exit 0
              fi
              echo "push リトライ $i..."
              sleep $((i * 5))
            done
            echo "push 3回失敗" && exit 1
          else
            echo "ranking_cache.json が見つかりません。スキップします。"
          fi
