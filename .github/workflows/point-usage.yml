name: ポイント活用ヒント（毎月16日）

on:
  schedule:
    # 毎月16日 18:00 JST (= UTC 9:00) と 18:30 JST に冗長fire
    # スクリプト側 point_usage_posted.json で月次重複排除
    - cron: '0 9 16 * *'
    - cron: '30 9 16 * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: point-usage
  cancel-in-progress: false

jobs:
  post-tip:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install requests requests-oauthlib

      - name: ポイント活用ヒントを投稿
        env:
          TWITTER_API_KEY:             ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:          ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:        ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: python post_point_usage.py

      - name: 投稿履歴をコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f point_usage_posted.json ]; then
            git add point_usage_posted.json
            if git diff --cached --quiet; then
              echo "履歴に変更なし"
              exit 0
            fi
            git commit -m "chore: ポイント活用ヒント投稿履歴を更新 [skip ci]"
            for i in 1 2 3; do
              if git pull --rebase origin main && git push; then
                echo "push 成功（試行 $i）"
                exit 0
              fi
              sleep $((i * 5))
            done
            echo "push 3回失敗" && exit 1
          fi
