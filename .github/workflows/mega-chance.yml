name: 最強日アナウンス

on:
  schedule:
    # 毎日 7:00 JST (UTC 22:00 前日) に走らせる
    # スクリプト側で「最強日 = マラソンpointup中 × 月初回0/5日」を判定し、
    # 該当日のみ投稿。それ以外の日は静かにスキップ。
    - cron: '0 22 * * *'
    - cron: '30 22 * * *'  # 取りこぼし対策の冗長fire
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write   # mega_chance_posted.json をコミットするため

concurrency:
  group: mega-chance
  cancel-in-progress: false

jobs:
  post-mega:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install requests requests-oauthlib

      - name: 最強日チェック＆アナウンス投稿
        env:
          TWITTER_API_KEY:             ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:          ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:        ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: python post_mega_chance.py

      - name: 投稿履歴をコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f mega_chance_posted.json ]; then
            git add mega_chance_posted.json
            if git diff --cached --quiet; then
              echo "履歴に変更なし"
              exit 0
            fi
            git commit -m "chore: 最強日アナウンス履歴を更新 [skip ci]"
            for i in 1 2 3; do
              if git pull --rebase origin main && git push; then
                echo "push 成功（試行 $i）"
                exit 0
              fi
              sleep $((i * 5))
            done
            echo "push 3回失敗" && exit 1
          fi
