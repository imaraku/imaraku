name: マイルドさん差分チェック（取りこぼし拾い）

# 稼働中（2026-05-31 マイルドさん連絡OK → schedule 有効化）。
# 毎日 23:00 JST に起動し、スクリプト側 is_trigger_day が
# 「月末／マラソン開始前日／マイルドさんの大型セール・ワンダフルデー新着」の日だけ実行する。
on:
  workflow_dispatch:
    inputs:
      force:
        description: '日付ゲートを無視して即実行（テスト用）'
        type: boolean
        default: true

  schedule:
    - cron: '0 14 * * *'    # 23:00 JST
    - cron: '10 14 * * *'   # 23:10 JST バックアップ（cron 取りこぼし対策・地雷#5）

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: mild-diff
  cancel-in-progress: false

jobs:
  mild-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install requests

      - name: マイルドさん差分チェック
        id: diff
        env:
          MILD_DIFF_FORCE: ${{ inputs.force }}
        run: python check_mild_diff.py

      - name: 変更があればコミット & プッシュ
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add new_campaigns.json
          git commit -m "chore: マイルドさん差分で取りこぼしを追加 [skip ci]"
          # 他ワークフローとの同時刻競合対策：rebase+retry 付き push
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then
              echo "push 成功（試行 $i）"
              exit 0
            fi
            echo "push リトライ $i..."
            sleep $((i * 5))
          done
          echo "push 3回失敗" && exit 1
