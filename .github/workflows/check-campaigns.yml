name: キャンペーン状態の自動チェック

on:
  schedule:
    # 2時間ごとに実行（JST = UTC+9 で計算）
    # 0:00 JST  → UTC 15:00 前日
    - cron: '0 15 * * *'
    # 2:00 JST  → UTC 17:00
    - cron: '0 17 * * *'
    # 4:00 JST  → UTC 19:00
    - cron: '0 19 * * *'
    # 6:00 JST  → UTC 21:00
    - cron: '0 21 * * *'
    # 8:00 JST  → UTC 23:00
    - cron: '0 23 * * *'
    # 10:00 JST → UTC 1:00
    - cron: '0 1 * * *'
    # 12:00 JST → UTC 3:00
    - cron: '0 3 * * *'
    # 14:00 JST → UTC 5:00
    - cron: '0 5 * * *'
    # 16:00 JST → UTC 7:00
    - cron: '0 7 * * *'
    # 18:00 JST → UTC 9:00
    - cron: '0 9 * * *'
    # 20:00 JST → UTC 11:00  ← マラソン・各種キャンペーン開始タイミング
    - cron: '0 11 * * *'
    # 22:00 JST → UTC 13:00
    - cron: '0 13 * * *'

  # 手動実行（緊急時の即時更新）
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24 を使用（将来の廃止に対応）

concurrency:
  group: check-campaigns
  cancel-in-progress: false

jobs:
  check-campaigns:
    runs-on: ubuntu-latest
    timeout-minutes: 8   # URL生存チェック並列化済みだが念のため

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install requests

      - name: キャンペーン状態をチェック
        id: check
        run: python check_campaigns.py

      - name: 変更があればコミット & プッシュ
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add campaign_status.json new_campaigns.json marathon_schedule.json expired_entries.json
          git commit -m "chore: キャンペーン状態を自動更新 [skip ci]"
          # ranking-check 等との同時刻競合対策：rebase+retry 付き push
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then
              echo "push 成功（試行 $i）"
              exit 0
            fi
            echo "push リトライ $i..."
            sleep $((i * 5))
          done
          echo "push 3回失敗" && exit 1
