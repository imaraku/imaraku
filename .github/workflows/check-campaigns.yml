name: キャンペーン状態の自動チェック
 
on:
  schedule:
    # 2時間ごとに実行（JST = UTC+9 で計算）
    # 0:00 JST  → UTC 15:00 前日
    - cron: '0 15 * * *'
    # 2:00 JST  → UTC 17:00
    - cron: '0 17 * * *'
    # 4:00 JST  → UTC 19:00
    - cron: '0 19 * * *'
    # 6:00 JST  → UTC 21:00
    - cron: '0 21 * * *'
    # 8:00 JST  → UTC 23:00
    - cron: '0 23 * * *'
    # 10:00 JST → UTC 1:00
    - cron: '0 1 * * *'
    # 12:00 JST → UTC 3:00
    - cron: '0 3 * * *'
    # 14:00 JST → UTC 5:00
    - cron: '0 5 * * *'
    # 16:00 JST → UTC 7:00
    - cron: '0 7 * * *'
    # 18:00 JST → UTC 9:00
    - cron: '0 9 * * *'
    # 20:00 JST → UTC 11:00  ← マラソン・各種キャンペーン開始タイミング
    - cron: '0 11 * * *'
    # 22:00 JST → UTC 13:00
    - cron: '0 13 * * *'
 
  # 手動実行（緊急時の即時更新）
  workflow_dispatch:
 
permissions:
  contents: write
 
jobs:
  check-campaigns:
    runs-on: ubuntu-latest
 
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
 
      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: 依存パッケージをインストール
        run: pip install requests
 
      - name: キャンペーン状態をチェック
        id: check
        run: python check_campaigns.py
 
      - name: 変更があればコミット & プッシュ
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add campaign_status.json new_campaigns.json
          git commit -m "chore: キャンペーン状態を自動更新 [skip ci]"
          git push
 
