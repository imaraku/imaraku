name: マラソン事前告知ツイート

on:
  schedule:
    # 19:50 JST（= UTC 10:50）を中心に冗長化（GitHub Actions cron 取りこぼし対策）
    # スクリプト側 preannounce_fired.json で日次重複排除を行うため、複数fireしても2発目以降スキップ
    - cron: '40 10 * * *'   # 19:40 JST
    - cron: '50 10 * * *'   # 19:50 JST
    - cron: '0 11 * * *'    # 20:00 JST  (※日次ツイートと同時刻だが対象が異なる)
  # 手動テスト用
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24 を使用（将来の廃止に対応）

permissions:
  contents: write   # preannounce_fired.json をコミット・プッシュするため

concurrency:
  group: marathon-preannounce
  cancel-in-progress: false

jobs:
  post-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install requests requests-oauthlib

      - name: マラソン状態を確認して事前告知ツイート
        env:
          TWITTER_API_KEY:             ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:          ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:        ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: python post_marathon_alert.py

      - name: 投稿履歴をコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f preannounce_fired.json ]; then
            git add preannounce_fired.json
            if git diff --cached --quiet; then
              echo "履歴に変更なし"
              exit 0
            fi
            git commit -m "chore: 事前告知履歴を更新 [skip ci]"
            for i in 1 2 3; do
              if git pull --rebase origin main && git push; then
                echo "push 成功（試行 $i）"
                exit 0
              fi
              sleep $((i * 5))
            done
            echo "push 3回失敗" && exit 1
          fi
